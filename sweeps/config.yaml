method: bayes          # options: grid | random | bayes
metric:
  goal: maximize
  name: val_acc

parameters:

  # ── Model ──────────────────────────────────────────────────────────────────
  arch:
    value: kimianet
  pretrained:
    value: true
  freeze_backbone:
    value: 1

  # ── Training ───────────────────────────────────────────────────────────────
  epochs:
    value: 5          # fixed – change to a range if you want to sweep it
  batch_size:
    values: [128, 256, 512]
  lr:
    distribution: log_uniform_values
    min: 1e-5
    max: 1e-2
  weight_decay:
    distribution: log_uniform_values
    min: 1e-6
    max: 1e-2

  # ── LoRA ───────────────────────────────────────────────────────────────────
  lora_r:
    values: [0, 4, 8, 16]   # 0 → LoRA disabled
  lora_alpha:
    values: [8, 16, 32]

  # ── Data augmentation ──────────────────────────────────────────────────────
  gaussian_blur:
    values: [true, false]
  mix_alpha:
    values: [0.0, 0.4, 1.0]
  mix_prob:
    distribution: uniform
    min: 0.1
    max: 0.5

  # ── Stain augmentation ─────────────────────────────────────────────────────
  HEAug_beta1:
    distribution: uniform
    min: 0.1
    max: 1
  HEAug_beta2:
    distribution: uniform
    min: 0.1
    max: 1
  HEAug_prob:
    distribution: uniform
    min: 0.1
    max: 1


  # ── Infrastructure ─────────────────────────────────────────────────────────
  num_workers:
    value: 16